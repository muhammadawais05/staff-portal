name: Jest Changed

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Checkout ref
        type: string
        required: false

concurrency:
  group: jest-changed-${{ github.ref }}
  cancel-in-progress: true

env:
  NPM_TOKEN: ${{ secrets.NPM_TOKEN_READ_ONLY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  STATUS_CHECK_NAME: Test:Jest Changed
  STATUS_TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  setup:
    name: Set up Jest
    runs-on: ['org/toptal', 'os/linux', 'arch/x64', 'size/large']
    steps:
      - name: Set status check - pending
        uses: actions/github-script@v9
        env:
          STATUS_STATE: pending
        with:
          script: |
            const { owner, repo } = context.issue;
            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: context.sha,
              context: process.env.STATUS_CHECK_NAME,
              state: process.env.STATUS_STATE,
              target_url: process.env.STATUS_TARGET_URL
            })

      - name: Checkout
        uses: actions/checkout@v3
        with:
          # This makes Actions fetch all Git history so lerna command --since origin/master can work properly
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '14.17'

      - name: Build node modules cache
        uses: actions/cache@v3
        id: node-modules-cache
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-jest_changed-node_modules-${{ github.sha }}

      - name: Get yarn cache directory path
        if: ${{ steps.node-modules-cache.outputs.cache-hit != 'true' }}
        id: yarn-cache-dir-path
        run: echo "::set-output name=dir::$(yarn cache dir)"

      - name: Check yarn cache
        if: ${{ steps.node-modules-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@v3
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: node-cache-${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            node-cache-${{ runner.os }}-yarn-

      - name: Install dependencies
        run: |
          yarn policies set-version
          yarn install --frozen-lockfile --ignore-optional --silent --non-interactive

      - name: Build schema cache
        uses: actions/cache@v3
        with:
          path: 'tmp-graphql/*.graphql'
          key: ${{ runner.os }}-jest_changed-schema-${{ github.run_id }}

      - name: Setup Google cloud toolchain
        uses: google-github-actions/setup-gcloud@v0.6.0
        with:
          service_account_key: ${{ secrets.GCR_GQLGW_SCHEMAS_BUCKET_ACCOUNT }}
          export_default_credentials: true

      - name: Fetch gql schemas
        run: yarn fetch:graphql-schemas

      - name: Build types cache
        uses: actions/cache@v3
        id: gql-types-cache
        with:
          path: |
            libs/graphql
            **/*.gql.types.tsx
          key: ${{ runner.os }}-types-${{ hashFiles('**/codegen.js', '**/*.graphql', '**/*.gql.ts') }}

      - name: Count package tests
        env:
          CI_ONLY_CHANGED: true
        run: yarn test:count-tests

      - name: Cache package tests count
        uses: actions/cache@v3
        with:
          path: package-tests-count.json
          key: ${{ runner.os }}-jest_changed-tests-count-${{ github.run_id }}

      - name: Generate types
        if: ${{ steps.gql-types-cache.outputs.cache-hit != 'true' }}
        run: yarn generate:types

  jest:
    name: Run Jest chunk
    runs-on: ['org/toptal', 'os/linux', 'arch/x64', 'size/large']
    needs: setup
    timeout-minutes: 45
    outputs:
      status: ${{ job.status }}
    strategy:
      fail-fast: true
      matrix:
        instance: [0, 1, 2, 3, 4, 5]

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '14.17'

      - name: Restore node modules cache
        uses: actions/cache@v3
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-jest_changed-node_modules-${{ github.sha }}

      - name: Restore schemas
        uses: actions/cache@v3
        with:
          path: 'tmp-graphql/*.graphql'
          key: ${{ runner.os }}-jest_changed-schema-${{ github.run_id }}

      - name: Restore types
        uses: actions/cache@v3
        with:
          path: |
            libs/graphql
            **/*.gql.types.tsx
          key: ${{ runner.os }}-types-${{ hashFiles('**/codegen.js', '**/*.graphql', '**/*.gql.ts') }}

      - name: Restore package tests count
        uses: actions/cache@v3
        with:
          path: package-tests-count.json
          key: ${{ runner.os }}-jest_changed-tests-count-${{ github.run_id }}

      - name: Run jest tests
        env:
          CI_NODE_TOTAL: ${{ strategy.job-total }}
          CI_NODE_INDEX: ${{ matrix.instance }}
        run: yarn test:ci

  complete:
    name: Complete Jest
    runs-on: ['org/toptal', 'os/linux', 'arch/x64', 'size/standard']
    needs: [jest]
    if: ${{ always() }}
    steps:
      - name: Set status check - success / failure / error
        uses: actions/github-script@v9
        env:
          STATUS_STATE: ${{ needs.jest.outputs.status == 'success' && 'success' || 'error' }}
        with:
          script: |
            const { owner, repo } = context.issue;
            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: context.sha,
              context: process.env.STATUS_CHECK_NAME,
              state: process.env.STATUS_STATE,
              target_url: process.env.STATUS_TARGET_URL
            })
