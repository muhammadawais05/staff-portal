name: Lint

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Checkout ref
        type: string
        required: false

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Run Lint and Typecheck
    runs-on: ubuntu-latest

    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN_READ_ONLY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      STATUS_CHECK_NAME: Check:Lint
      STATUS_TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Set status check - pending
        uses: actions/github-script@v6
        env:
          STATUS_STATE: pending
        with:
          script: |
            const { owner, repo } = context.issue;
            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: context.sha,
              context: process.env.STATUS_CHECK_NAME,
              state: process.env.STATUS_STATE,
              target_url: process.env.STATUS_TARGET_URL
            })

      - name: Checkout
        uses: actions/checkout@v3
        with:
          # This makes Actions fetch all Git history so lerna command --since origin/master can work properly
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '14.17'

      - name: Install dependencies
        run: |
          yarn policies set-version
          yarn install --frozen-lockfile --ignore-optional --silent --non-interactive

      - name: Setup Google cloud toolchain
        uses: google-github-actions/setup-gcloud@v0.6.0
        with:
          service_account_key: ${{ secrets.GCR_GQLGW_SCHEMAS_BUCKET_ACCOUNT }}
          export_default_credentials: true

      - name: Fetch gql schemas
        run: yarn fetch:graphql-schemas

      - name: Check types cache
        uses: actions/cache@v3
        id: gql-types-cache
        with:
          path: |
            libs/graphql
            **/*.gql.types.tsx
          key: ${{ runner.os }}-types-${{ hashFiles('**/codegen.js', '**/*.graphql', '**/*.gql.ts') }}

      - name: Validate changed packages
        run: yarn packages:validate:changed

      - name: Run Circular Dependencies Check
        run: yarn davinci monorepo detect-circularity

      - name: Run GitHub CODEOWNERS Validator
        uses: mszostok/codeowners-validator@d7b92b1871fdd533618070bdae1f2766f7e7f084
        with:
          # "owners" check is not needed, as it is supported by GitHub by default
          checks: 'files,duppatterns,syntax'

      - name: Generate types
        if: ${{ steps.gql-types-cache.outputs.cache-hit != 'true' }}
        run: yarn generate:types

      - name: Check types
        run: |
          yarn typecheck
          yarn typecheck:cypress

      - name: Run linter
        env:
          CI_LINT: true
        run: yarn lint:ci

      - name: Run Unused Dependencies Check
        run: yarn depcheck

      - name: Set status check - success / failure / error
        if: ${{ always() }}
        uses: actions/github-script@v6
        env:
          STATUS_STATE: ${{ job.status != 'cancelled' && job.status || 'error' }}
        with:
          script: |
            const { owner, repo } = context.issue;
            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: context.sha,
              context: process.env.STATUS_CHECK_NAME,
              state: process.env.STATUS_STATE,
              target_url: process.env.STATUS_TARGET_URL
            })
