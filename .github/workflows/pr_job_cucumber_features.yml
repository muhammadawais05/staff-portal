name: Cucumber Features

on:
  workflow_dispatch:
    inputs:
      platform_branch:
        description: 'Platform branch'
        required: false
        default: 'master'

concurrency:
  group: features-${{ github.ref }}
  cancel-in-progress: true

env:
  NPM_TOKEN: ${{ secrets.NPM_TOKEN_READ_ONLY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  STATUS_CHECK_NAME: Cucumber Features
  STATUS_TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  feature_tests_gha:
    name: Cucumber Features
    runs-on: ['org/toptal', 'os/linux', 'arch/x64', 'size/standard']
    steps:
      - name: Set status check - pending
        uses: actions/github-script@v6
        env:
          STATUS_STATE: pending
        with:
          script: |
            const { owner, repo } = context.issue;
            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: context.sha,
              context: process.env.STATUS_CHECK_NAME,
              state: process.env.STATUS_STATE,
              target_url: process.env.STATUS_TARGET_URL
            })

      - name: Checkout toptal actions
        uses: actions/checkout@v2
        with:
          repository: toptal/actions
          token: ${{ secrets.TOPTAL_DEVBOT_TOKEN }}
          path: ./.github/actions/

      - name: Run the Features action
        uses: ./.github/actions/features/
        with:
          platform_branch: ${{ github.event.inputs.platform_branch }}
          staff_portal_branch: ${{ github.sha }}
          billing_branch: 'master'
          testbox_profile: 'business_tests'
          cucumber_profile: 'staff_portal_testbox'
          worker_count: 60
          job_name_prefix: 'staff-portal'
          kubernetes_namespaces_basename: 'business-tests'
          TOPTAL_BUILD_BOT_SSH_KEY: ${{ secrets.TOPTAL_BUILD_BOT_SSH_KEY }}
          TOPTAL_DEVBOT_TOKEN: ${{ secrets.TOPTAL_DEVBOT_TOKEN }}
          GCR_TESTBOX_ACCOUNT_KEY: ${{ secrets.GCR_TESTBOX_ACCOUNT_KEY }}
          BUNDLE_ENTERPRISE__CONTRIBSYS__COM: ${{ secrets.BUNDLE_ENTERPRISE__CONTRIBSYS__COM }}
          BUNDLE_GITHUB__COM: ${{ secrets.BUNDLE_GITHUB__COM }}
          NPM_TOKEN_READ_ONLY: ${{ secrets.NPM_TOKEN_READ_ONLY }}
          ANVIL_USERNAME: ${{ secrets.ANVIL_USERNAME }}
          ANVIL_PASSWORD: ${{ secrets.ANVIL_PASSWORD }}
          ANVIL_BASIC_AUTH: ${{ secrets.ANVIL_BASIC_AUTH }}

      - name: Get HTML report
        uses: actions-hub/gcloud@master
        if: failure()
        env:
          PROJECT_ID: toptal-ci
          APPLICATION_CREDENTIALS: ${{ secrets.GCR_TESTBOX_ACCOUNT_KEY }}
        with:
          args: cp gs://toptal-ci-artifacts/staff-portal_testbox_gha/${{github.run_number}}/results.html .
          cli: gsutil

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: results.html
          path: ./results.html

      - name: Set status check - success / failure / error
        if: ${{ always() }}
        uses: actions/github-script@v6
        env:
          STATUS_STATE: ${{ job.status != 'cancelled' && job.status || 'error' }}
        with:
          script: |
            const { owner, repo } = context.issue;
            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: context.sha,
              context: process.env.STATUS_CHECK_NAME,
              state: process.env.STATUS_STATE,
              target_url: process.env.STATUS_TARGET_URL
            })
