name: Jest

on:
  workflow_dispatch:

concurrency:
  group: jest-${{ github.ref }}
  cancel-in-progress: true

env:
  NPM_TOKEN: ${{ secrets.NPM_TOKEN_READ_ONLY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  STATUS_CHECK_NAME: Test:Jest
  STATUS_TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  setup:
    name: Set up Jest
    runs-on: ['org/toptal', 'os/linux', 'arch/x64', 'size/large']
    steps:
      - name: Set status check - pending
        uses: actions/github-script@v6
        env:
          STATUS_STATE: pending
        with:
          script: |
            const { owner, repo } = context.issue;
            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: context.sha,
              context: process.env.STATUS_CHECK_NAME,
              state: process.env.STATUS_STATE,
              target_url: process.env.STATUS_TARGET_URL
            })

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '14.17'

      - name: Build node modules cache
        uses: actions/cache@v3
        id: node-modules-cache
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-jest-node_modules-${{ github.sha }}

      - name: Get yarn cache directory path
        if: ${{ steps.node-modules-cache.outputs.cache-hit != 'true' }}
        id: yarn-cache-dir-path
        run: echo "::set-output name=dir::$(yarn cache dir)"

      - name: Check yarn cache
        if: ${{ steps.node-modules-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@v3
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: node-cache-${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            node-cache-${{ runner.os }}-yarn-

      - name: Install dependencies
        run: |
          yarn policies set-version
          yarn install --frozen-lockfile --ignore-optional --silent --non-interactive

      - name: Build schema cache
        uses: actions/cache@v3
        with:
          path: 'tmp-graphql/*.graphql'
          key: ${{ runner.os }}-schema-${{ github.run_id }}

      - name: Setup Google cloud toolchain
        uses: google-github-actions/setup-gcloud@v0.6.0
        with:
          service_account_key: ${{ secrets.GCR_GQLGW_SCHEMAS_BUCKET_ACCOUNT }}
          export_default_credentials: true

      - name: Fetch gql schemas
        run: yarn fetch:graphql-schemas

      - name: Build types cache
        uses: actions/cache@v3
        id: gql-types-cache
        with:
          path: |
            libs/graphql
            **/*.gql.types.tsx
          key: ${{ runner.os }}-types-${{ hashFiles('**/codegen.js', '**/*.graphql', '**/*.gql.ts') }}

      - name: Count package tests
        run: yarn test:count-tests

      - name: Cache package tests count
        uses: actions/cache@v3
        with:
          path: package-tests-count.json
          key: ${{ runner.os }}-jest-tests-count-${{ github.run_id }}

      - name: Generate types
        if: ${{ steps.gql-types-cache.outputs.cache-hit != 'true' }}
        run: yarn generate:types

  jest:
    name: Run Jest chunk
    runs-on: ['org/toptal', 'os/linux', 'arch/x64', 'size/large']
    needs: setup
    timeout-minutes: 45
    outputs:
      status: ${{ job.status }}
    strategy:
      fail-fast: true
      matrix:
        instance: [0, 1, 2, 3, 4, 5]

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '14.17'

      - name: Restore node modules cache
        uses: actions/cache@v3
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-jest-node_modules-${{ github.sha }}

      - name: Restore schemas
        uses: actions/cache@v3
        with:
          path: 'tmp-graphql/*.graphql'
          key: ${{ runner.os }}-schema-${{ github.run_id }}

      - name: Restore types
        uses: actions/cache@v3
        with:
          path: |
            libs/graphql
            **/*.gql.types.tsx
          key: ${{ runner.os }}-types-${{ hashFiles('**/codegen.js', '**/*.graphql', '**/*.gql.ts') }}

      - name: Restore package tests count
        uses: actions/cache@v3
        with:
          path: package-tests-count.json
          key: ${{ runner.os }}-jest-tests-count-${{ github.run_id }}

      - name: Run jest tests
        env:
          CI_NODE_TOTAL: ${{ strategy.job-total }}
          CI_NODE_INDEX: ${{ matrix.instance }}
        run: yarn test:ci

      - name: Rename jest coverage reports
        # istanbul-merge allows to use glob patterns, thanks to which we can
        # merge coverage files from /hosts/staff-portal, /namespaces and /libs
        run: |
          npx istanbul-merge --out "hosts/staff-portal/coverage/coverage-final-merged.json" "./**/coverage/coverage-final.json"
          mv "hosts/staff-portal/coverage/coverage-final-merged.json" "hosts/staff-portal/coverage/coverage-final-${{ matrix.instance }}.json"
          rm -f "hosts/staff-portal/coverage/coverage-final.json"

      - name: Store jest report artifacts
        uses: actions/upload-artifact@v3
        with:
          name: jest-report-worker-${{ matrix.instance }}
          path: hosts/staff-portal/coverage

  test_coverage:
    name: 'Combined Jest test coverage report'
    needs: jest
    runs-on: ['org/toptal', 'os/linux', 'arch/x64', 'size/large']
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '14.17'

      - name: Restore node modules cache
        uses: actions/cache@v3
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-jest-node_modules-${{ github.sha }}

      - name: 'Download all artifacts'
        uses: actions/download-artifact@v3
        with:
          path: coverage

      - name: Generate report
        run: |
          mkdir coverage/jest
          cp coverage/jest-report-worker-*/coverage-final-*.json coverage/jest/
          mkdir coverage/jest-overall
          yarn nyc merge coverage/jest coverage/jest-overall/jest-coverage.json
          yarn nyc report --temp-dir coverage/jest-overall --reporter html --report-dir coverage/jest-html

      # Based on this https://github.com/actions/upload-artifact/issues/199
      # Uploading a file could take 100ms (per file), so archiving the output folder should improve the speed
      - name: Archive coverage artifacts
        run: |
          zip -r -j jest-coverage-json.zip coverage/jest-overall/jest-coverage.json
          zip -r jest-coverage-report.zip coverage/jest-html/

      - name: Save coverage json
        uses: actions/upload-artifact@v3
        with:
          name: jest-coverage-json
          path: jest-coverage-json.zip

      - name: Save coverage report
        uses: actions/upload-artifact@v3
        with:
          name: jest-coverage-report
          path: jest-coverage-report.zip

  combined_coverage:
    uses: toptal/staff-portal/.github/workflows/pr_job_combined_coverage.yml@master
    name: Combined Jest + Cypress coverage report
    needs: [test_coverage]
    secrets:
      NPM_TOKEN_READ_ONLY: ${{ secrets.NPM_TOKEN_READ_ONLY }}
    with:
      callerWorkflowType: jest
      branchRef: ${{github.event.ref}}

  complete:
    name: Complete Jest
    runs-on: ['org/toptal', 'os/linux', 'arch/x64', 'size/standard']
    needs: [jest, test_coverage, combined_coverage]
    if: ${{ always() }}
    steps:
      - name: Set status check - success / failure / error
        uses: actions/github-script@v6
        env:
          STATUS_STATE: ${{ needs.jest.outputs.status == 'success' && 'success' || 'error' }}
        with:
          script: |
            const { owner, repo } = context.issue;
            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: context.sha,
              context: process.env.STATUS_CHECK_NAME,
              state: process.env.STATUS_STATE,
              target_url: process.env.STATUS_TARGET_URL
            })
