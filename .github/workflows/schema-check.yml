name: Schema Check

on:
  # Allow triggering the workflow from the upstream.
  # See https://github.com/toptal/graphql-gateway/actions/workflows/schema-check.yml.
  workflow_dispatch:
    inputs:
      schema_url:
        description: 'Schema URL to be validated against operations.'
        required: true

      service_name:
        description: 'Provider name. Needs to match GitHub repo name.'
        required: true

      service_revision:
        description: 'Provider revision (commit SHA).'
        required: true

      parent_build_url:
        description: 'URL to the build which triggered this workflow'
        required: false

      consumer_revision:
        description: 'Staff Portal revision (branch or commit).'
        required: false
        default: latest-release

concurrency:
  group: ${{ github.workflow }}-${{ inputs.service_name}}-${{ inputs.service_revision }}
  cancel-in-progress: true

jobs:
  generate_types_and_ts_check:
    name: Generate and check types
    runs-on: ubuntu-latest

    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN_READ_ONLY }}
      GITHUB_TOKEN: ${{ secrets.TOPTAL_DEVBOT_TOKEN }}
      SENTRY_DSN: ${{ secrets.GQL_G_ORCHESTRATOR_SENTRY_DSN }}
      BUILD_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
      PARENT_BUILD_URL: ${{ inputs.parent_build_url }}
      STAFF_PORTAL_SCHEMA_URL: ${{ inputs.schema_url }}/staff.graphql
      LENS_SCHEMA_URL: gs://gqlgw-introspection/production_lens_schema.graphql

    steps:
      - name: Clone toptal actions repo
        uses: actions/checkout@v3
        with:
          repository: toptal/actions
          token: ${{ secrets.TOPTAL_DEVBOT_TOKEN }}
          path: ./.github/actions/

      - name: Add Anvil build trace
        if: env.PARENT_BUILD_URL
        uses: ./.github/actions/anvil-link-builds
        with:
          anvil_basic_auth: ${{ secrets.ANVIL_BASIC_AUTH }}
          parent_build_url: ${{ env.PARENT_BUILD_URL }}
          current_build_url: ${{ env.BUILD_URL }}
          sentry_dsn: ${{ env.SENTRY_DSN }}
        continue-on-error: true

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '14'

      - name: Fetch latest release tag name
        id: fetch_latest_release
        if: inputs.consumer_revision == 'latest-release'
        uses: ./.github/actions/fetch-latest-release
        with:
          auth_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ steps.fetch_latest_release.outputs.tag_name || inputs.consumer_revision }}

      - name: Check node_modules cache
        uses: actions/cache@v2
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Authenticate GCS
        uses: google-github-actions/setup-gcloud@v0.2.1
        with:
          service_account_key: ${{ secrets.GCR_GQLGW_SCHEMAS_BUCKET_ACCOUNT }}
          export_default_credentials: true

      - name: Download schema
        run: |
          gsutil cp $STAFF_PORTAL_SCHEMA_URL tmp-graphql/gateway_schema.graphql
          gsutil cp $LENS_SCHEMA_URL tmp-graphql/lens_schema.graphql

      - name: Generate types
        run: yarn generate:types:from-root-schema

      - name: Run type checker
        id: typecheck
        run: yarn typecheck

      - name: Report consumer status
        if: ${{ always() && !contains(github.event.repository.name, inputs.service_name) }}
        run: |
          DATA=$(jq -n \
          --arg status "${{ job.status }}" \
          --arg ctx "Schema Check / ${{ github.event.repository.name }}" \
          --arg desc "${{ github.event.repository.name }} verification complete" \
          --arg url "${BUILD_URL}" \
          '{"state": $status, "context": $ctx, "description": $desc, "target_url": $url}')

          curl \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -d "${DATA}" \
            https://api.github.com/repos/toptal/${{ inputs.service_name }}/statuses/${{ inputs.service_revision }}
